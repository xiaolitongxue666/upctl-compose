services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: upctl
      POSTGRES_PASSWORD: upctl_dev
      POSTGRES_DB: upctl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upctl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  authcore:
    build:
      context: ./authcore
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      UC_PORT: "3000"
      UC_DB_URL: postgres://upctl:upctl_dev@postgres:5432/upctl
      UC_URL: http://localhost:3000
      NGX_URL: http://localhost:8088
      JWT_KEY: upctl-dev-jwt-key-change-in-production
      LOGGER_LEVEL: INFO
      POOL_SIZE: "10"
      EXPIRATION_DAYS: "30"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ROCKET_ADDRESS: "0.0.0.0"
      SKIP_POST_LOGIN: "true"
    ports:
      - "3000:3000"

  upctl-svc:
    build:
      context: ./upctl-svc
    depends_on:
      authcore:
        condition: service_started
    environment:
      UPCTL_PORT: "3005"
      GITEA_API_BASE: http://gitea:3000/api/v1
      GITEA_AUTH_HEADER: "Basic YWktYm90OmFpLWJvdC1kZXYtcGFzcw=="
      JWT_KEY: upctl-dev-jwt-key-change-in-production
      no_proxy: "localhost,127.0.0.1,gitea,upctl-svc,postgres,authcore,host.docker.internal"
      NO_PROXY: "localhost,127.0.0.1,gitea,upctl-svc,postgres,authcore,host.docker.internal"
    ports:
      - "3005:3005"
    volumes:
      - uploads:/app/uploads

  upctl-web:
    build:
      context: ./upctl-web
    depends_on:
      - authcore
      - upctl-svc
    ports:
      - "8088:80"

  authcoreadmin:
    build:
      context: ./authcoreadmin
    depends_on:
      - authcore
    ports:
      - "8089:80"

  ai-agent:
    build:
      context: ./upctl-agent/ai-agent
    depends_on:
      upctl-svc:
        condition: service_started
    environment:
      GITEA_API_BASE: http://upctl-svc:3005/api/v2/upctl/api
      GITEA_AUTH_HEADER: "Basic YWktYm90OmFpLWJvdC1kZXYtcGFzcw=="
      JWT_KEY: upctl-dev-jwt-key-change-in-production
      POLL_INTERVAL: "300"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-deepseek-v4-flash}
      no_proxy: "localhost,127.0.0.1,gitea,upctl-svc,postgres,authcore,host.docker.internal"
      NO_PROXY: "localhost,127.0.0.1,gitea,upctl-svc,postgres,authcore,host.docker.internal"
    volumes:
      - agent-workspace:/app/workspace

  gitea:
    image: gitea/gitea:1.22
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: gitea_dev
      GITEA__server__DOMAIN: localhost:3001
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__SSH_PORT: 2222
      GITEA__security__SECRET_KEY: gitea-dev-secret-key
      GITEA__security__INSTALL_LOCK: "true"
      # Auto-create admin on first start
      GITEA__admin__USER: ai-bot
      GITEA__admin__PASSWD: ai-bot-dev-pass
      GITEA__admin__EMAIL: ai-bot@example.com
    ports:
      - "3001:3000"
      - "2222:22"
    volumes:
      - gitea:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  gitea:
  uploads:
  agent-workspace:
