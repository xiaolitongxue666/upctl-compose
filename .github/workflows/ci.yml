name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate docker-compose.yml
        run: docker compose config

  integration:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Mask secrets in logs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: echo "::add-mask::$DEEPSEEK_API_KEY"

      - name: Build images
        run: docker compose build authcore authcoreadmin upctl-svc upctl-web ai-agent

      - name: Start dependencies (postgres + redis + gitea)
        run: |
          docker compose up -d postgres redis gitea

      - name: Wait for postgres health
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U upctl && break
            sleep 2
          done

      - name: Start built services
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: |
          docker compose up -d authcore authcoreadmin upctl-svc upctl-web ai-agent
          docker compose logs --tail=20 authcore upctl-svc upctl-web ai-agent

      - name: Wait for authcore (90s timeout)
        run: |
          for i in $(seq 1 45); do
            result=$(curl -s http://localhost:3000/ 2>/dev/null || echo "")
            if [ -n "$result" ]; then
              echo "authcore ready (response: ${result:0:80})"
              break
            fi
            sleep 2
          done
          # Verify login endpoint works
          echo "Checking authcore login endpoint..."
          login_resp=$(curl -s -X POST http://localhost:3000/api/v1/uc/login_with_password \
            -H "Content-Type: application/json" \
            -H "HtyHost: localhost" \
            -d '{"username":"demo","password":"demo123"}' 2>/dev/null || echo "FAILED")
          echo "Login response: ${login_resp:0:200}"
          # Show authcore logs for debugging
          docker compose logs --tail=30 authcore

      - name: Wait for upctl-svc (30s timeout)
        run: |
          for i in $(seq 1 30); do
            result=$(curl -sf http://localhost:3005/ 2>/dev/null || echo "")
            if [ "$result" = "upctl-svc" ]; then echo "upctl-svc ready"; break; fi
            sleep 2
          done

      - name: Configure upctl-svc (memory_dir + prompt_prefix) for agent tests
        run: |
          # Configure memory_dir so agent-prompt tests include "Memory 上下文" section
          docker compose exec -T upctl-svc sh -c 'mkdir -p /app/data && echo "/app/data" > /app/data/memory_dir.txt'
          docker compose exec -T upctl-svc sh -c 'echo "不要进入plan mode，直接干活" > /app/data/prompt_prefix.txt'
          # Create MEMORY.md so the assembled prompt references it
          printf "upctl-compose dev compose stack\n" | docker compose exec -T upctl-svc sh -c 'cat > /app/data/MEMORY.md'

      - name: Smoke test — nginx serves frontend
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8088/)
          echo "nginx status: $http_code"
          test "$http_code" = "200" || test "$http_code" = "304"

      - name: Smoke test — frontend is an HTML page
        run: |
          content_type=$(curl -s -o /dev/null -w "%{content_type}" http://localhost:8088/)
          echo "Content-Type: $content_type"
          echo "$content_type" | grep -q "text/html"

      - name: Smoke test — upctl-svc reponds
        run: |
          result=$(curl -sf http://localhost:3005/)
          echo "upctl-svc: $result"
          test "$result" = "upctl-svc"

      - name: Smoke test — ai-agent connected to DeepSeek API
        env:
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: docker compose exec -T ai-agent python3 /app/test_deepseek.py

      - name: Seed Gitea with org/repo/labels
        run: |
          # Ensure admin user exists (Gitea auto-installs with INSTALL_LOCK from env)
          docker compose exec -T -u git gitea gitea admin user create --config /data/gitea/conf/app.ini --username ai-bot --password ai-bot-dev-pass --email ai-bot@example.com --admin 2>&1 || echo "admin may already exist"
          # Create org, repo, and labels via API
          docker compose cp scripts/setup-gitea.py ai-agent:/app/setup-gitea.py
          docker compose exec -T ai-agent python3 /app/setup-gitea.py

      - name: Copy test file to ai-agent
        run: docker compose cp tests/e2e_test.py ai-agent:/app/e2e_test.py

      - name: E2E — Authentication
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test auth

      - name: E2E — Gitea connectivity
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test gitea_connectivity

      - name: E2E — Project archive
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test project_archive

      - name: E2E — Ticket CRUD
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test create_and_close_ticket

      - name: E2E — DeepSeek API
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test deepseek_processing

      - name: E2E — Poll worker modules
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test ai_agent_poll_worker

      - name: E2E — Full pipeline (create → DeepSeek → comment → close)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test full_pipeline

      - name: E2E — Real pipeline via pick_and_process
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        continue-on-error: true
        run: docker compose exec -T ai-agent python3 /app/e2e_test.py --test real_pipeline

      - name: E2E frontend tests (Playwright)
        working-directory: tests/playwright
        run: |
          npm install
          npx playwright install chromium --with-deps 2>&1 | tail -3
          npx playwright test

      - name: Cleanup
        if: always()
        run: docker compose down -v
